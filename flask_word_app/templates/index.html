<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>システム英単語 Webテスト</title>
    <style>
        * { box-sizing: border-box; } 
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; text-align: center; color: #333; margin: 0; padding: 15px; }
        #app-container { 
            max-width: 450px; width: 100%; margin: 0 auto; background: white; 
            padding: 25px 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            min-height: 500px;
        }
        h1 { color: #0056b3; font-size: 22px; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
        .setting-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; border: 1px solid #e9ecef; }
        .setting-title { margin-top: 0; font-weight: bold; color: #495057; font-size: 13px; margin-bottom: 10px; display: block; }
        .select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .select-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 10px; }
        .btn-opt { padding: 10px 2px; font-size: 12px; background-color: #fff; border: 1px solid #ced4da; border-radius: 6px; cursor: pointer; }
        .btn-opt.active { background-color: #0056b3; color: white; border-color: #0056b3; }
        .btn-main { padding: 16px; font-size: 18px; margin: 8px 0; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 100%; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-red { background-color: #fa5252; color: white; }

        .custom-inputs { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px; background: #fff; padding: 10px 5px; border-radius: 6px; border: 1px solid #ced4da; }
        .custom-inputs span { font-size: 12px; white-space: nowrap; font-weight: bold; color: #495057; }
        input[type="number"] { width: 75px; padding: 8px 2px; border: 1px solid #ced4da; border-radius: 4px; text-align: center; font-size: 15px; }

        .number { color: #6c757d; font-size: 14px; font-weight: bold; text-align: left; }
        .status { font-size: 16px; margin: 10px 0; color: #495057; font-weight: bold;}
        .card { font-size: 34px; font-weight: bold; margin: 50px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        .btn-action { padding: 15px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-full { width: 100%; background-color: #f1f3f5; }
        .btn-half { width: 48%; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-wrong { background-color: #e03131; color: white; }
        .btn-list { width: 100%; background-color: #fff4e6; color: #d9480f; border: 1px solid #ffd8a8; margin-bottom: 20px; }
        
        .hidden { display: none !important; }

        .mistake-box { margin-top: 5px; text-align: left; background: #fff; border: 1px solid #ced4da; border-radius: 8px; max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .mistake-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #f1f3f5; font-size: 15px; }
        .mistake-item:nth-child(even) { background-color: #f8f9fa; }
        .mistake-item:last-child { border-bottom: none; }
        
        .mistake-left { display: flex; align-items: center; flex: 1; }
        .mistake-num { color: #6c757d; font-size: 13px; font-family: monospace; font-weight: bold; width: 45px; margin-right: 5px; }
        .mistake-eng { font-weight: bold; color: #333; } 
        /* 修正：赤シートで消えやすい明るい赤オレンジ(#ff5722)に変更し、太字(bold)を解除(normal) */
        .mistake-jap { color: #ff5722; font-weight: normal; text-align: right; flex: 1; margin-left: 10px; word-break: break-word; } 
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-screen">
        <h1>システム英単語</h1>
        <div class="subtitle">Web Test Application</div>

        <button id="mistake-list-btn" class="btn-action btn-list hidden" onclick="showMistakeScreen()">
            📝 苦手な単語を確認する (<span id="mistake-count">0</span>語)
        </button>

        <div class="setting-box">
            <span class="setting-title">■ 出題数</span>
            <div class="select-grid">
                <button class="btn-opt count-btn active" onclick="setCount(10, this)">10問</button>
                <button class="btn-opt count-btn" onclick="setCount(20, this)">20問</button>
                <button class="btn-opt count-btn" onclick="setCount(50, this)">50問</button>
                <button class="btn-opt count-btn" onclick="setCount(100, this)">100問</button>
            </div>
            <input type="hidden" id="question-count" value="10">
        </div>
        <div class="setting-box">
            <span class="setting-title">■ 範囲を選択（Stage指定）</span>
            <div class="select-grid-2">
                <button class="btn-opt stage-btn active" data-start="1" data-end="600" onclick="toggleStageBtn(this)">Stage 1<br>(1-600)</button>
                <button class="btn-opt stage-btn" data-start="601" data-end="1200" onclick="toggleStageBtn(this)">Stage 2<br>(601-1200)</button>
                <button class="btn-opt stage-btn" data-start="1201" data-end="1700" onclick="toggleStageBtn(this)">Stage 3<br>(1201-1700)</button>
                <button class="btn-opt stage-btn" data-start="1701" data-end="2027" onclick="toggleStageBtn(this)">Stage 4<br>(1701-2027)</button>
            </div>
            <div class="custom-inputs">
                <span>直接入力:</span>
                <input type="number" id="custom-start" value="1" min="0" max="2027" step="100" oninput="clearStageSelection()" onkeydown="if(event.key === 'Enter') startTest('normal')">
                <span style="color: #999;">〜</span>
                <input type="number" id="custom-end" value="600" min="0" max="2027" step="100" oninput="clearStageSelection()" onkeydown="if(event.key === 'Enter') startTest('normal')">
            </div>
        </div>
        <button class="btn-main btn-blue" onclick="startTest('normal')">通常テスト開始</button>
        <button class="btn-main btn-red" onclick="startTest('weak')">苦手克服モード</button>
    </div>

    <div id="mistake-screen" class="hidden">
        <h2 style="color: #e03131; margin-top: 10px;">要復習リスト</h2>
        <div class="subtitle" id="mistake-screen-subtitle">現在登録されている苦手な単語です</div>
        <div class="mistake-box" id="full-mistake-list"></div>
        
        <button id="start-weak-test-btn" class="btn-main btn-red" onclick="startTest('weak')" style="margin-bottom: 10px;">この単語でテストを開始する</button>
        <button class="btn-main btn-blue" onclick="hideMistakeScreen()">ホームに戻る</button>
    </div>

    <div id="test-screen" class="hidden">
        <div class="number" id="word-number">No.0000</div>
        <div class="status" id="status-text">1 / 10</div>
        <div class="card" id="word-display" onclick="handleCardClick()">Word</div>
        <div id="flip-controls">
            <button class="btn-action btn-full" onclick="flipCard()">答えを見る (Space/Tap)</button>
        </div>
        <div id="judge-controls" class="hidden" style="display: flex; justify-content: space-between;">
            <button class="btn-action btn-half btn-wrong" onclick="markIncorrect()">✕ 苦手 (←)</button>
            <button class="btn-action btn-half btn-green" onclick="markCorrect()">〇 正解 (→)</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Result</h2>
        <div class="card" id="score-display" style="font-size: 32px; cursor: default; margin: 20px 0; min-height: 60px;">0/0</div>
        <p id="saving-text" style="color: #28a745; font-weight: bold; margin-top: 15px;"></p>
        <button class="btn-main btn-blue" onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
    let words = []; let currentMode = 'normal'; let currentIndex = 0; let isFront = true; let correctWords = []; let incorrectWords = [];
    
    document.addEventListener('DOMContentLoaded', () => {
        updateMistakeCount();
    });

    function updateMistakeCount() {
        let saved = JSON.parse(localStorage.getItem('weak_words') || '[]');
        const mistakeBtn = document.getElementById('mistake-list-btn');
        if (saved.length > 0) {
            mistakeBtn.classList.remove('hidden');
            document.getElementById('mistake-count').innerText = saved.length;
        } else {
            mistakeBtn.classList.add('hidden');
        }
    }

    function showMistakeScreen() {
        let saved = JSON.parse(localStorage.getItem('weak_words') || '[]');
        const list = document.getElementById('full-mistake-list');
        const testBtn = document.getElementById('start-weak-test-btn');
        list.innerHTML = ''; 
        
        if (saved.length > 0) {
            testBtn.style.display = 'block'; 
            saved.sort((a, b) => parseInt(a.Number) - parseInt(b.Number));
            saved.forEach(w => {
                const item = document.createElement('div');
                item.className = 'mistake-item';
                item.innerHTML = `
                    <div class="mistake-left">
                        <span class="mistake-num">No.${w.Number}</span>
                        <span class="mistake-eng">${w.English}</span>
                    </div>
                    <span class="mistake-jap">${w.Japanese}</span>
                `;
                list.appendChild(item);
            });
        } else {
            testBtn.style.display = 'none'; 
            list.innerHTML = '<div style="text-align:center; color:#666; padding: 30px 10px;">現在、苦手な単語は登録されていません。<br>素晴らしいです！✨</div>';
        }
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('mistake-screen').classList.remove('hidden');
    }

    function hideMistakeScreen() {
        document.getElementById('mistake-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }

    function setCount(num, btn) { document.getElementById('question-count').value = num; document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function clearStageSelection() { document.querySelectorAll('.stage-btn.active').forEach(b => b.classList.remove('active')); }
    function toggleStageBtn(btn) {
        btn.classList.toggle('active');
        const activeStages = document.querySelectorAll('.stage-btn.active');
        if (activeStages.length > 0) {
            let minStart = Infinity; let maxEnd = 0;
            activeStages.forEach(b => {
                const s = parseInt(b.getAttribute('data-start'));
                const e = parseInt(b.getAttribute('data-end'));
                if (s < minStart) minStart = s; if (e > maxEnd) maxEnd = e;
            });
            document.getElementById('custom-start').value = minStart;
            document.getElementById('custom-end').value = maxEnd;
        }
    }

    function handleCardClick() {
        if (document.getElementById('test-screen').classList.contains('hidden')) return;
        if (isFront) flipCard();
        else toggleWord();
    }

    function toggleWord() {
        const word = words[currentIndex];
        const display = document.getElementById('word-display');
        display.innerText = (display.innerText === word.Japanese) ? word.English : word.Japanese;
    }

    async function startTest(mode) {
        currentMode = mode;
        const count = parseInt(document.getElementById('question-count').value);
        if (mode === 'normal') {
            const selectedRanges = [];
            const activeStages = document.querySelectorAll('.stage-btn.active');
            if (activeStages.length > 0) {
                activeStages.forEach(btn => { selectedRanges.push([parseInt(btn.getAttribute('data-start')), parseInt(btn.getAttribute('data-end'))]); });
            } else {
                const start = parseInt(document.getElementById('custom-start').value);
                const end = parseInt(document.getElementById('custom-end').value);
                if (!isNaN(start) && !isNaN(end)) selectedRanges.push([start, end]);
            }
            if(selectedRanges.length === 0) { alert("範囲を指定してください。"); return; }
            const response = await fetch('/get_words', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({count: count, ranges: selectedRanges}) });
            const data = await response.json();
            if(data.error) { alert(data.error); return; }
            words = data.words;
        } else {
            let saved = JSON.parse(localStorage.getItem('weak_words') || '[]');
            if (saved.length === 0) { alert("苦手な単語がありません。"); return; }
            saved.sort(() => Math.random() - 0.5);
            words = saved.slice(0, count);
        }
        currentIndex = 0; correctWords = []; incorrectWords = [];
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('mistake-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        
        updateDisplay();
    }
    function updateDisplay() {
        if(currentIndex >= words.length) { finishTest(); return; }
        const word = words[currentIndex];
        document.getElementById('status-text').innerText = `${currentIndex + 1} / ${words.length}`;
        document.getElementById('word-number').innerText = `No.${word.Number}`;
        document.getElementById('word-display').innerText = isFront ? word.English : word.Japanese;
        document.getElementById('flip-controls').classList.toggle('hidden', !isFront);
        document.getElementById('judge-controls').classList.toggle('hidden', isFront);
    }
    function flipCard() { isFront = false; updateDisplay(); }
    function markCorrect() { correctWords.push(words[currentIndex]); nextCard(); }
    function markIncorrect() { incorrectWords.push(words[currentIndex]); nextCard(); }
    function nextCard() { currentIndex++; isFront = true; updateDisplay(); }
    
    function finishTest() {
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-display').innerText = `${words.length}問中 ${correctWords.length}問正解`;

        let saved = JSON.parse(localStorage.getItem('weak_words') || '[]');
        let weakDict = {}; saved.forEach(w => weakDict[w.Number] = w);
        incorrectWords.forEach(w => weakDict[w.Number] = w);
        if (currentMode === 'weak') correctWords.forEach(w => { if (weakDict[w.Number]) delete weakDict[w.Number]; });
        localStorage.setItem('weak_words', JSON.stringify(Object.values(weakDict)));
        document.getElementById('saving-text').innerText = "記録を保存しました。";
    }

    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('test-screen').classList.contains('hidden')) {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (isFront) flipCard();
                else toggleWord();
            }
            else if (e.code === 'ArrowLeft' && !isFront) markIncorrect();
            else if (e.code === 'ArrowRight' && !isFront) markCorrect();
        } else if (!document.getElementById('result-screen').classList.contains('hidden')) {
            if (e.code === 'Space' || e.code === 'Enter') location.reload();
        }
    });
</script>
</body>
</html>
